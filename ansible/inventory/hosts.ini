[redis_nodes]
redis-node-1 ansible_host=127.0.0.1 ansible_port=2201 redis_cluster_ip=10.10.0.11
redis-node-2 ansible_host=127.0.0.1 ansible_port=2202 redis_cluster_ip=10.10.0.12
redis-node-3 ansible_host=127.0.0.1 ansible_port=2203 redis_cluster_ip=10.10.0.13
redis-node-4 ansible_host=127.0.0.1 ansible_port=2204 redis_cluster_ip=10.10.0.14
redis-node-5 ansible_host=127.0.0.1 ansible_port=2205 redis_cluster_ip=10.10.0.15
redis-node-6 ansible_host=127.0.0.1 ansible_port=2206 redis_cluster_ip=10.10.0.16

# Spare nodes for scale-out — NOT provisioned by default (separate group)
[redis_spare_nodes]
redis-node-7 ansible_host=127.0.0.1 ansible_port=2207 redis_cluster_ip=10.10.0.17
redis-node-8 ansible_host=127.0.0.1 ansible_port=2208 redis_cluster_ip=10.10.0.18

# Vars apply to ALL hosts (active + spare) so the scale command can reach the spares
[all:vars]
ansible_user=redis
ansible_ssh_private_key_file=/home/kavin/.ssh/id_rsa
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args=-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
